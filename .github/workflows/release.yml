name: release

on:
  push:
    branches: [main, master]
  workflow_dispatch: {}

# semantic-release needs to push commits, tags, and create GitHub releases.
permissions:
  contents: write
  issues: write
  pull-requests: write

# Only one release run at a time per branch — avoids racing tags.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    # Skip when the push itself is the chore(release): commit semantic-release
    # creates, otherwise we'd loop. The [skip ci] tag in that commit message
    # already prevents the workflow from running, this is belt-and-braces.
    if: ${{ !contains(github.event.head_commit.message, 'chore(release):') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # persist-credentials false → semantic-release uses GITHUB_TOKEN to push.
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Build the Nuxt output (.output/ is self-contained; no node_modules at
      # runtime). Result is what gets shipped as the GitHub release tarball.
      - name: Build app
        run: pnpm build

      # Pack .output as a release asset. The tarball goes inside `dist/` so the
      # @semantic-release/github asset glob picks it up. Filename has a stable
      # base so consumers can curl `latest` predictably.
      - name: Pack release artifact
        run: |
          mkdir -p dist
          tar -czf "dist/hermes-war-room.tar.gz" .output
          # Also a checksum, useful for `sha256sum -c` on the consumer side.
          (cd dist && sha256sum hermes-war-room.tar.gz > hermes-war-room.tar.gz.sha256)
          ls -lh dist/

      # semantic-release lives in devDependencies so it's already installed by
       # the `pnpm install --frozen-lockfile` step above. Mixing `npm install`
       # with pnpm's symlinked node_modules used to fail (Cannot read
       # properties of null) — running it through `pnpm exec` avoids that.
      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GIT_AUTHOR_NAME:  github-actions[bot]
          GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME:  github-actions[bot]
          GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
        run: pnpm exec semantic-release
